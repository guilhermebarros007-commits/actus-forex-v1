<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACTUS-FOREX — Professional Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #09090b; color: #f4f4f5; }
    .glass { background: rgba(22, 22, 26, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .sidebar-active { background: rgba(124, 106, 247, 0.1); border-left: 3px solid #7c6af7; color: #fff; }
    .page { display: none; }
    .page.active { display: flex; flex-direction: column; }
  </style>
</head>
<body class="h-screen flex overflow-hidden">
  <!-- Sidebar -->
  <aside class="w-64 glass flex flex-col p-6 gap-8">
    <div class="flex items-center gap-3">
      <div class="h-10 w-10 rounded-lg bg-indigo-600 flex items-center justify-center text-white font-bold">A</div>
      <h1 class="font-bold text-lg tracking-tight">ACTUS-FOREX</h1>
    </div>
    <nav class="flex-1 space-y-2">
      <a href="#" class="flex items-center gap-3 p-3 rounded-lg sidebar-active" onclick="showPage('dashboard')">
        <span class="material-symbols-outlined">dashboard</span> Dashboard
      </a>
      <a href="#" class="flex items-center gap-3 p-3 rounded-lg text-zinc-400 hover:bg-white/5" onclick="showPage('portfolio')">
        <span class="material-symbols-outlined">account_balance_wallet</span> Portfolio
      </a>
      <a href="#" class="flex items-center gap-3 p-3 rounded-lg text-zinc-400 hover:bg-white/5" onclick="showPage('news')">
        <span class="material-symbols-outlined">newspaper</span> News
      </a>
      <a href="#" class="flex items-center gap-3 p-3 rounded-lg text-zinc-400 hover:bg-white/5" onclick="showPage('chat')">
        <span class="material-symbols-outlined">chat</span> AI Chat
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col p-8 overflow-y-auto gap-8">
    <header class="flex justify-between items-center">
      <h2 class="text-2xl font-bold" id="page-title">Boardroom Dashboard</h2>
      <div class="flex gap-4">
        <button class="bg-indigo-600 hover:bg-indigo-700 px-6 py-2 rounded-lg font-bold transition-all shadow-lg shadow-indigo-500/20" onclick="triggerHeartbeat()">Disparar Heartbeat</button>
      </div>
    </header>

    <!-- Dashboard Page -->
    <div id="page-dashboard" class="page active gap-6">
      <div class="grid grid-cols-3 gap-6">
        <div class="glass p-6 rounded-2xl">
          <p class="text-zinc-500 text-xs font-bold uppercase mb-2">Total Balance</p>
          <h3 class="text-3xl font-bold" id="total-balance">$---.--</h3>
        </div>
        <div class="glass p-6 rounded-2xl border-l-4 border-l-emerald-500">
          <p class="text-zinc-500 text-xs font-bold uppercase mb-2">Lux Decision</p>
          <h3 class="text-3xl font-bold text-emerald-500" id="lux-decision">ANALYZING</h3>
        </div>
        <div class="glass p-6 rounded-2xl">
          <p class="text-zinc-500 text-xs font-bold uppercase mb-2">Active Positions</p>
          <h3 class="text-3xl font-bold" id="active-positions">0</h3>
        </div>
      </div>
      
      <div class="glass p-6 rounded-2xl">
        <h4 class="font-bold mb-4">Live Terminal Feed</h4>
        <div id="terminal" class="bg-black/50 p-4 rounded-lg font-mono text-xs text-lime-400 h-64 overflow-y-auto space-y-1">
          <div>[SYSTEM] Initing ACTUS-FOREX core...</div>
        </div>
      </div>
    </div>

    <!-- Portfolio Page -->
    <div id="page-portfolio" class="page gap-6">
       <div class="grid grid-cols-3 gap-6" id="agent-cards"></div>
    </div>

    <!-- News Page -->
    <div id="page-news" class="page gap-4" id="news-feed"></div>

    <!-- Chat Page -->
    <div id="page-chat" class="page flex-1 flex flex-col glass rounded-2xl overflow-hidden">
       <div id="chat-messages" class="flex-1 p-6 space-y-4 overflow-y-auto"></div>
       <div class="p-6 border-t border-white/5 flex gap-4">
          <input type="text" id="chat-input" class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-indigo-500" placeholder="Ask Lux or Analysts...">
          <button class="bg-indigo-600 px-6 py-3 rounded-xl font-bold" onclick="sendMessage()">Send</button>
       </div>
    </div>
  </main>

  <script>
    function showPage(p) {
      document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
      document.getElementById('page-' + p).classList.add('active');
    }
    
    async function triggerHeartbeat() {
      const btn = event.target;
      btn.disabled = true; btn.innerText = 'Analysing...';
      try {
        const res = await fetch('/api/heartbeat/trigger', {method: 'POST'});
        const data = await res.json();
        document.getElementById('lux-decision').innerText = data.decision;
        addLog(`[LUX] Decision: ${data.decision} triggered on ${data.asset}`);
      } catch(e) { console.error(e); }
      finally { btn.disabled = false; btn.innerText = 'Disparar Heartbeat'; }
    }

    function addLog(msg) {
      const t = document.getElementById('terminal');
      t.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
      t.scrollTop = t.scrollHeight;
    }

    // Real-time log simulation or implement WS here for production
    setInterval(() => {
      if(Math.random() > 0.7) addLog("Fetching market depth data...");
    }, 5000);
  </script>
</body>
</html>
